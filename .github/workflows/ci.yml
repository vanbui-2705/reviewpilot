name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: |
          .next
          node_modules
        key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-next-

    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit

    # - name: Lint
    #   run: npm run lint
    #   # Skipping lint due to existing warnings/errors. Enable after cleanup.

    - name: Build
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1
        NODE_OPTIONS: "--max-old-space-size=4096"
